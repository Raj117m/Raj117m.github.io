<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj's Catalogue</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 640px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fdfdfd;
  }
  header {
    margin-bottom: 2.5rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.25rem;
  }
  header p {
    color: #666;
    margin-top: 0;
  }
  ol {
    list-style: none;
    padding: 0;
    counter-reset: item;
  }
  li {
    counter-increment: item;
    display: flex;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid #e5e5e5;
  }
  li::before {
    content: "#" counter(item);
    font-weight: 600;
    color: #999;
    flex-shrink: 0;
    width: 2.5rem;
  }
  li .title {
    font-weight: 500;
  }
  li .desc {
    color: #666;
    font-size: 0.9rem;
    margin-top: 0.15rem;
  }
  li .link {
    display: inline-block;
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: #0366d6;
    text-decoration: none;
  }
  li .link:hover {
    text-decoration: underline;
  }
  section > h2 {
    font-size: 1.1rem;
    color: #444;
    margin-bottom: 1rem;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.85rem;
    color: #999;
  }

  details#add-creation {
    margin-top: 1.5rem;
  }
  details#add-creation summary {
    cursor: pointer;
    font-size: 0.9rem;
    color: #0366d6;
  }
  #add-form {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-width: 400px;
  }
  #add-form label {
    display: flex;
    flex-direction: column;
    font-size: 0.8rem;
    color: #666;
    gap: 0.25rem;
  }
  #add-form input {
    font: inherit;
    padding: 0.4rem 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  #add-form button {
    align-self: flex-start;
    font: inherit;
    padding: 0.4rem 0.9rem;
    border: 1px solid #0366d6;
    background: #0366d6;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  #add-output {
    margin-top: 1rem;
    max-width: 400px;
  }
  #add-output p {
    font-size: 0.8rem;
    color: #666;
  }
  #add-snippet {
    width: 100%;
    box-sizing: border-box;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.8rem;
    padding: 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  #copy-btn {
    margin-top: 0.5rem;
    font: inherit;
    padding: 0.3rem 0.8rem;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
  }

  @media (prefers-color-scheme: dark) {
    body { color: #eaeaea; background: #121212; }
    header p, li .desc, footer { color: #999; }
    li { border-bottom-color: #2a2a2a; }
    section > h2 { color: #aaa; }
    li .link { color: #58a6ff; }
    details#add-creation summary { color: #58a6ff; }
    #add-form label { color: #999; }
    #add-form input, #add-snippet, #copy-btn {
      background: #1c1c1c;
      color: #eaeaea;
      border-color: #333;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>Raj</h1>
    <p>A catalogue of things I make.</p>
  </header>

  <section>
    <h2>Creations</h2>
    <ol>
      <li>
        <div>
          <div class="title">Item #1 — The Catalogue itself</div>
          <div class="desc">Built 2026-07-13. The first thing I've ever put live on the internet.</div>
          <a class="link" href="https://raj117m.github.io/">View</a>
        </div>
      </li>
    </ol>

    <details id="add-creation">
      <summary>+ Add a creation</summary>
      <form id="add-form">
        <label>Name
          <input type="text" id="add-name" required>
        </label>
        <label>Description
          <input type="text" id="add-desc" required>
        </label>
        <label>Link
          <input type="url" id="add-link" placeholder="https://" required>
        </label>
        <button type="submit">Add Creation</button>
      </form>
      <div id="add-output" hidden>
        <p>Paste this into index.html, just above the closing &lt;/ol&gt; tag. Then commit and push.</p>
        <textarea id="add-snippet" rows="6" readonly></textarea>
        <button id="copy-btn" type="button">Copy</button>
      </div>
    </details>
  </section>

  <footer>
    Updated as I make new things.
  </footer>

  <script>
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('add-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('add-name').value.trim();
      const desc = document.getElementById('add-desc').value.trim();
      const link = document.getElementById('add-link').value.trim();
      const nextNumber = document.querySelectorAll('#add-creation').length
        ? document.querySelector('section ol').children.length + 1
        : 1;

      const snippet =
'      <li>\n' +
'        <div>\n' +
'          <div class="title">Item #' + nextNumber + ' — ' + escapeHtml(name) + '</div>\n' +
'          <div class="desc">' + escapeHtml(desc) + '</div>\n' +
'          <a class="link" href="' + escapeHtml(link) + '">View</a>\n' +
'        </div>\n' +
'      </li>';

      document.getElementById('add-snippet').value = snippet;
      document.getElementById('add-output').hidden = false;
    });

    document.getElementById('copy-btn').addEventListener('click', function () {
      const textarea = document.getElementById('add-snippet');
      textarea.select();
      navigator.clipboard.writeText(textarea.value).then(function () {
        const btn = document.getElementById('copy-btn');
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = original; }, 1500);
      });
    });
  </script>
</body>
</html>
