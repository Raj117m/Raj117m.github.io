<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj's Catalogue</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 640px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fdfdfd;
  }
  header {
    margin-bottom: 2.5rem;
  }
  h1 {
    font-size: 1.75rem;
    margin-bottom: 0.25rem;
  }
  header p {
    color: #666;
    margin-top: 0;
  }
  ol {
    list-style: none;
    padding: 0;
    counter-reset: item;
  }
  li {
    counter-increment: item;
    display: flex;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid #e5e5e5;
  }
  li::before {
    content: "#" counter(item);
    font-weight: 600;
    color: #999;
    flex-shrink: 0;
    width: 2.5rem;
  }
  li .title {
    font-weight: 500;
  }
  li .desc {
    color: #666;
    font-size: 0.9rem;
    margin-top: 0.15rem;
  }
  li .link {
    display: inline-block;
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: #0366d6;
    text-decoration: none;
  }
  li .link:hover {
    text-decoration: underline;
  }
  section > h2 {
    font-size: 1.1rem;
    color: #444;
    margin-bottom: 1rem;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.85rem;
    color: #999;
  }

  @media (prefers-color-scheme: dark) {
    body { color: #eaeaea; background: #121212; }
    header p, li .desc, footer { color: #999; }
    li { border-bottom-color: #2a2a2a; }
    section > h2 { color: #aaa; }
    li .link { color: #58a6ff; }
  }
</style>
</head>
<body>
  <header>
    <h1>Raj</h1>
    <p>A catalogue of things I make.</p>
  </header>

  <section>
    <h2>Creations</h2>
    <ol>
      <li>
        <div>
          <div class="title">Item #1 — The Catalogue itself</div>
          <div class="desc">Built 2026-07-13. The first thing I've ever put live on the internet.</div>
          <a class="link" href="https://raj117m.github.io/">View</a>
        </div>
      </li>
    </ol>
  </section>

  <footer>
    Updated as I make new things.
  </footer>
</body>
</html>
